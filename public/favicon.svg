<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Card body -->
  <rect width="32" height="32" rx="6" fill="#0e0520"/>
  <rect width="32" height="32" rx="6" fill="url(#shine)"/>
  <rect width="32" height="32" rx="6" fill="none" stroke="#8a5cff" stroke-width="1.5"/>

  <!-- A rank top-left -->
  <text x="4.5" y="12"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10" font-weight="bold"
    fill="#c9b0ff">A</text>

  <!-- Large spade center -->
  <!-- spade: heart-like top two lobes + downward point + stem -->
  <path d="M16 7
    C16 7 9 12 9 16.5
    C9 19.5 11.5 20.5 13.5 19.5
    C12.5 21.5 11 22 9.5 22.5
    H22.5
    C21 22 19.5 21.5 18.5 19.5
    C20.5 20.5 23 19.5 23 16.5
    C23 12 16 7 16 7Z"
    fill="#8a5cff"/>

  <!-- Gradient shine -->
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8a5cff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#8a5cff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
